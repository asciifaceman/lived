version: 1
behaviors:
  - key: player_scavenge_scrap
    name: Scavenge Scrap
    summary: Search for scrap and occasional coin in nearby alleys.
    actorType: player
    durationMinutes: 30
    staminaCost: 18
    requirements:
      unlocks: []
      items: {}
    costs: {}
    outputs:
      scrap: 1
    outputExpressions:
      coins: "1+d2"
    outputChances:
      coins: 0.35
    startMessage: "You search alleys and abandoned lots for anything useful."
    completeMessage: "You return with salvage and a few coins from quick trades."

  - key: player_sell_scrap
    name: Sell Scrap
    summary: Convert scrap into coins when the market is open.
    actorType: player
    durationMinutes: 10
    staminaCost: 4
    requirements:
      unlocks: []
      items:
        scrap: 1
    costs:
      scrap: 1
    outputs: {}
    outputExpressions: {}
    requiresMarketOpen: true
    startMessage: "You head toward the nearest buyer with scrap in hand."
    completeMessage: "The scrap changes hands and your coin pouch feels heavier."
    notes:
      - Coins are resolved from current market price for scrap (AI-driven market).

  - key: player_sell_wood
    name: Sell Wood
    summary: Bring cut wood to market buyers for coins.
    actorType: player
    durationMinutes: 12
    staminaCost: 6
    requirements:
      unlocks: []
      items:
        wood: 1
    costs:
      wood: 1
    outputs: {}
    outputExpressions: {}
    requiresMarketOpen: true
    startMessage: "You carry your cut wood to market stalls and lumber buyers."
    completeMessage: "The wood lot sells and your coin pouch grows."
    notes:
      - Coins are resolved from current market price for wood (AI-driven market).

  - key: player_petition_forester
    name: Petition Forester
    summary: Purchase forest cutting rights to unlock wood gathering.
    actorType: player
    scheduleModes:
      - once
    singleUsePerAscension: true
    durationMinutes: 45
    staminaCost: 6
    requirements:
      unlocks: []
      items:
        coins: 12
    costs:
      coins: 12
    outputs: {}
    outputExpressions: {}
    grantsUnlocks:
      - forest_access
    startMessage: "You wait in a long line to petition for forest cutting rights."
    completeMessage: "A stamped permit is granted. The forest now opens to your axe."

  - key: player_chop_wood
    name: Chop Wood
    summary: Gather wood from the forest once access is unlocked.
    actorType: player
    durationMinutes: 25
    staminaCost: 22
    requirements:
      unlocks:
        - forest_access
      items: {}
    costs: {}
    outputs: {}
    outputExpressions:
      wood: "1-3"
    startMessage: "You enter the forest edge and begin chopping carefully."
    completeMessage: "You haul back cut wood for crafting or sale."

  - key: player_pushups
    name: Pushups
    summary: Train strength through bodyweight exercise.
    actorType: player
    exclusiveGroup: body_state
    durationMinutes: 20
    staminaCost: 14
    requirements:
      unlocks: []
      items: {}
    costs: {}
    outputs: {}
    outputExpressions: {}
    statDeltas:
      strength: 1
    startMessage: "You drop to the ground and begin a disciplined pushup set."
    completeMessage: "Your muscles burn and adapt. Strength inches upward."

  - key: player_run_training
    name: Run Training
    summary: Build endurance to improve stamina cap and recovery.
    actorType: player
    exclusiveGroup: body_state
    durationMinutes: 30
    staminaCost: 20
    requirements:
      unlocks: []
      items: {}
    costs: {}
    outputs: {}
    outputExpressions: {}
    statDeltas:
      endurance: 1
    startMessage: "You settle into a steady running pace to build endurance."
    completeMessage: "Your lungs and legs adapt. Your stamina ceiling improves."

  - key: player_rest
    name: Rest
    summary: Recover stamina faster than passive recovery by taking deliberate downtime.
    actorType: player
    exclusiveGroup: body_state
    durationMinutes: 30
    staminaCost: 0
    requirements:
      unlocks: []
      items: {}
    costs: {}
    outputs: {}
    outputExpressions: {}
    startMessage: "You step back from work and focus on steady recovery."
    completeMessage: "The rest pays off, and your stamina rebounds quickly."

  - key: player_socialize_market
    name: Socialize at Market
    summary: Improve social stat through market networking.
    actorType: player
    durationMinutes: 30
    staminaCost: 8
    requirements:
      unlocks: []
      items: {}
    costs: {}
    outputs: {}
    outputExpressions: {}
    statDeltas:
