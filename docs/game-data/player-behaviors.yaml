    startMessage: "You attend an evening class focused on risk, pricing, and disciplined trade planning."
    completeMessage: "You leave with sharper market instincts and improved financial skill."

  - key: player_buy_weights
    name: Buy Weights
    summary: Buy home weights to unlock heavier strength training.
    actorType: player
    scheduleModes:
      - once
    singleUsePerAscension: true
    durationMinutes: 15
    staminaCost: 0
    requirements:
      unlocks: []
      items:
        coins: 60
    costs:
      coins: 60
    outputs: {}
    outputExpressions: {}
    grantsUnlocks:
      - home_weights
    startMessage: "You search second-hand stalls for a battered but usable weight set."
    completeMessage: "You haul a weight set home. Heavier training is now possible."

  - key: player_weight_training
    name: Weight Training
    summary: Advance strength quickly with home weight routines.
    actorType: player
    exclusiveGroup: body_state
    durationMinutes: 35
    staminaCost: 26
    requirements:
      unlocks:
        - home_weights
      items: {}
    costs: {}
    outputs: {}
    outputExpressions: {}
    statDeltas:
      strength: 3
    startMessage: "You commit to a focused weight training routine."
    completeMessage: "Progressive overload pays off. Your strength rises noticeably."

  - key: player_bet_underground_fight
    name: Bet Underground Fight
    summary: Place a risky nighttime wager on unsanctioned fights.
    actorType: player
    requiresNight: true
    durationMinutes: 20
    staminaCost: 2
    requirements:
      unlocks: []
      items:
        coins: 20
    costs:
      coins: 20
    outputs: {}
    outputExpressions:
      coins: "20+d80"
    outputChances:
      coins: 0.45
    startMessage: "You slip into a back-alley ring and put coins on a fighter."
    completeMessage: "The bets settle and the crowd thins before dawn."

  - key: player_night_dock_salvage
    name: Night Dock Salvage
    summary: Recover extra scrap at night while the docks are quiet.
    actorType: player
    requiresNight: true
    durationMinutes: 35
    staminaCost: 24
    requirements:
      unlocks: []
      items: {}
    costs: {}
    outputs:
      scrap: 2
    outputExpressions:
      coins: "1+d3"
    outputChances:
      coins: 0.25
    startMessage: "You comb the darkened dockyards for discarded metal and loose cargo bits."
    completeMessage: "You return from the docks with a heavy sack of salvage."

outputExpressionSyntax:
  staticRange: "1-5"
  diceRange: "1+d6"
  staticValue: "3"
  notes:
    - Output expressions are optional and evaluated on behavior completion.
    - "Static `outputs` and `outputExpressions` can both be present and are added together."
    - "`outputChances` is optional and uses decimal probabilities from 0.0 to 1.0."
