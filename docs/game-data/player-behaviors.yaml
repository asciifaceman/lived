    startMessage: "You spend time talking with traders, runners, and regular buyers."
    completeMessage: "You learn how people negotiate, and your social instincts sharpen."

  - key: player_study_ledger_math
    name: Study Ledger Math
    summary: Practice arithmetic and bookkeeping to improve financial skill.
    actorType: player
    durationMinutes: 40
    staminaCost: 4
    requirements:
      unlocks: []
      items: {}
    costs: {}
    outputs: {}
    outputExpressions: {}
    statDeltas:
      financial: 1
    startMessage: "You sit with market logs and work through pricing and spread calculations."
    completeMessage: "Your confidence with numbers grows. Financial skill improves."

  - key: player_take_finance_class
    name: Take Finance Class
    summary: Pay for structured lessons to accelerate financial growth.
    actorType: player
    durationMinutes: 55
    staminaCost: 6
    requirements:
      unlocks: []
      items:
        coins: 18
    costs:
      coins: 18
    outputs: {}
    outputExpressions: {}
    statDeltas:
