name: lived

services:
  lived-db:
    image: postgres:16-alpine
    container_name: lived-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lived
      POSTGRES_USER: lived
      POSTGRES_PASSWORD: lived
    volumes:
      - lived-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lived -d lived"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lived-network

  lived-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: lived:player
    container_name: lived-app
    restart: unless-stopped
    depends_on:
      lived-db:
        condition: service_healthy
    environment:
      LIVED_HTTP_ADDR: :8080
      LIVED_AUTO_MIGRATE: "true"
      LIVED_DATABASE_URL: postgres://lived:lived@lived-db:5432/lived?sslmode=disable
    ports:
      - "8080:8080"
    networks:
      - lived-network

volumes:
  lived-postgres-data:
    name: lived-postgres-data

networks:
  lived-network:
    name: lived-network
    driver: bridge
